<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Emerald Gradients -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Rich Golden Gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="lightGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Gloss/Glow Effects -->
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#022c22" flood-opacity="0.15" />
    </filter>
    <filter id="coinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Outer Ring (Islamic Geometric Accent) -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#goldGrad)" stroke-width="8" opacity="0.8" />
  <circle cx="256" cy="256" r="224" fill="none" stroke="url(#emeraldGrad)" stroke-width="4" opacity="0.3" />

  <!-- The Mosque Dome (Elegant shape with double-tier base) -->
  <g filter="url(#subtleShadow)">
    <!-- Base tier of the mosque -->
    <path d="M 112 360 L 400 360 L 380 320 L 132 320 Z" fill="url(#emeraldGrad)" />
    <!-- Pillars / Mihrab arches on the base -->
    <rect x="160" y="328" width="24" height="24" rx="4" fill="#ffffff" opacity="0.2" />
    <rect x="204" y="328" width="24" height="24" rx="4" fill="#ffffff" opacity="0.2" />
    <rect x="248" y="328" width="24" height="24" rx="4" fill="#ffffff" opacity="0.2" />
    <rect x="292" y="328" width="24" height="24" rx="4" fill="#ffffff" opacity="0.2" />
    <rect x="336" y="328" width="24" height="24" rx="4" fill="#ffffff" opacity="0.2" />

    <!-- Main Dome -->
    <path d="M 256 120 C 220 180 140 210 140 300 L 372 300 C 372 210 292 180 256 120 Z" fill="url(#emeraldGrad)" />
    <!-- Highlight on Dome left side -->
    <path d="M 256 120 C 225 172 155 205 145 285 C 160 210 220 180 256 120 Z" fill="url(#mintGrad)" opacity="0.6" />
  </g>

  <!-- Crescent and Star on top of the Dome -->
  <g transform="translate(256, 85)">
    <!-- Crescent -->
    <path d="M -15 -25 A 18 18 0 1 1 5 5 A 14 14 0 1 0 -15 -25 Z" fill="url(#goldGrad)" />
    <!-- Star -->
    <polygon points="12,-18 15,-10 23,-10 17,-5 19,3 12,-1 5,3 7,-5 1,-10 9,-10" fill="url(#lightGoldGrad)" />
  </g>

  <!-- Golden Savings Coin in the foreground -->
  <g filter="url(#coinShadow)">
    <!-- Coin Body -->
    <circle cx="256" cy="310" r="100" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="6" />
    <!-- Inner Coin Ridge -->
    <circle cx="256" cy="310" r="84" fill="none" stroke="url(#lightGoldGrad)" stroke-width="4" stroke-dasharray="12 6" />
    <!-- Core Coin Area -->
    <circle cx="256" cy="310" r="72" fill="url(#goldGrad)" />
    
    <!-- "Rp" Symbol representing Indonesian Rupiah Savings -->
    <text x="256" y="330" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="900" font-size="64" fill="#ffffff" text-anchor="middle" style="letter-spacing: -2px;">Rp</text>
    
    <!-- Decorative Stars on Coin -->
    <polygon points="190,310 195,313 192,318 197,315 202,318 199,313 204,310 198,310" fill="#ffffff" opacity="0.9" />
    <polygon points="322,310 317,313 320,318 315,315 310,318 313,313 308,310 314,310" fill="#ffffff" opacity="0.9" />
  </g>
</svg>